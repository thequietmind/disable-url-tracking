<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disable URL Tracking</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Disable URL Tracking</h1>
        <label class="switch-row">
          <span>Enabled</span>
          <input id="global-enabled" type="checkbox">
        </label>
      </header>

      <section>
        <div class="hostname" id="hostname">No active tab</div>
        <label for="site-mode">Current site mode</label>
        <select id="site-mode">
          <option value="default">Default</option>
          <option value="clean">Clean</option>
          <option value="compatibility">Compatibility</option>
          <option value="disabled">Disabled</option>
        </select>
      </section>

      <section class="actions">
        <button id="clean-current" type="button">Clean current URL</button>
        <button id="copy-clean" type="button">Copy clean URL</button>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
